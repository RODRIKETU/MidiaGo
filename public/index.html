<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaGo - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="logo-icon"></div>
                    <h1>MidiaGo</h1>
                </div>
                <button id="themeToggleBtn" class="btn-icon" title="Alternar Tema" style="border: none; background: transparent; color: var(--text-primary);">
                    <ion-icon name="sunny-outline"></ion-icon>
                </button>
            </div>
            <p class="subtitle" id="formSubtitle">Bem-vindo ao portal de mídia empresarial.</p>
            
            <form id="loginForm">
                <input type="hidden" id="formMode" value="login">
                
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="error-message" id="errorMessage"></div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span>Acessar Portal</span>
                </button>

                <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                    <span id="toggleModeText">Não tem uma conta?</span> 
                    <a href="#" id="toggleModeBtn" style="color: var(--primary); text-decoration: none; font-weight: 600;">Cadastre-se</a>
                </div>
            </form>
        </div>
        </div>
        
        <div id="lgpdTextContainer" style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.8rem; max-width: 400px;">
            <!-- LGPD Text will be injected here via JS -->
        </div>
    </div>
    
    <!-- Cookie Banner -->
    <div id="cookieBanner" class="cookie-banner hidden" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; background: var(--panel-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <div>
            <p id="cookieBannerText" style="margin-bottom: 0.5rem; font-size: 0.95rem; color: var(--text-primary);">Nós utilizamos cookies para melhorar sua experiência em nosso site.</p>
            <a id="cookieBannerLink" href="#" target="_blank" style="color: var(--primary); font-size: 0.85rem; text-decoration: none;">Leia nossa Política de Cookies</a>
        </div>
        <button id="acceptCookiesBtn" class="btn btn-primary" style="white-space: nowrap;">Concordo e Fechar</button>
    </div>
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
