<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaGo - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>MidiaGo</h1>
            </div>
            <p class="subtitle" id="formSubtitle">Bem-vindo ao portal de mídia empresarial.</p>
            
            <form id="loginForm">
                <input type="hidden" id="formMode" value="login">
                
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="error-message" id="errorMessage"></div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span>Acessar Portal</span>
                </button>

                <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                    <span id="toggleModeText">Não tem uma conta?</span> 
                    <a href="#" id="toggleModeBtn" style="color: var(--primary); text-decoration: none; font-weight: 600;">Cadastre-se</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
